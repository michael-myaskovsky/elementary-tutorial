version: 2

models:
  - name: stg_customers
    config:
      tags: ["staging", "PII"]
    columns:
      - name: customer_id

    meta: {}
    description: This model represents a staging table for customer data. It extracts
      and renames key fields, such as customer ID, first name, and last name, from
      the `customers_training` table in the `USAGE_DB.PUBLIC` schema. This staging
      table serves as a clean, standardized data source for downstream analytics and
      reporting on customer information, including any personally identifiable data
      (PII).
  - name: stg_orders
    config:
      tags: ["staging", "finance"]
    columns:
      - name: order_id
      - name: status

    meta: {}
    description: This model, `stg_orders`, represents a staging table for the orders
      data in the finance domain. It serves as a centralized and curated source of
      order information, including the order ID, customer ID, order date, and order
      status. The model performs basic transformations, such as renaming the columns
      to more meaningful names, to prepare the data for downstream analysis and reporting.
  - name: stg_payments
    config:
      tags: ["staging", "finance"]
    columns:
      - name: payment_id
      - name: payment_method

    meta: {}
    description: This model represents a staging table for the `payments` data, which
      includes essential payment details such as payment ID, order ID, and payment
      method. The key transformation is that the `amount` column is converted from
      cents to dollars to provide a more user-friendly representation of the payment
      amounts. This model serves as a foundation for further analysis and reporting
      in the finance domain.
  - name: stg_signups
    config:
      tags: ["staging", "PII"]
    columns:
      - name: signup_id
      - name: customer_email
    meta: {}
    description: The `stg_signups` model is a staging table that captures user signup
      information from the `signups_training` table in the `USAGE_DB.PUBLIC` schema.
      It extracts the `signup_id`, `customer_id`, `customer_email`, `hashed_password`,
      and `signup_date` fields, providing a clean and consistent dataset for downstream
      data analysis and transformation. This model serves as a foundation for further
      data modeling and insights related to user signups.
