version: 2

models:
  - name: customers
    description: This model provides a comprehensive view of customer information,
      including their order and payment history. It combines data from various sources,
      such as the `stg_customers`, `stg_orders`, `stg_payments`, and `stg_signups`
      tables, to create a centralized customer profile. The model calculates key metrics
      like the customer's first order date, most recent order date, number of orders,
      and lifetime value. This information can be used by data analysts and business
      stakeholders to understand customer behavior, identify high-value customers,
      and make informed decisions about customer acquisition and retention strategies.
    config:
      tags: ["PII"]

    columns:
      - name: customer_id
        description: This is a unique identifier for a customer

      - name: first_name
        description: Customer's first name. PII.

      - name: last_name
        description: Customer's last name. PII.

      - name: first_order
        description: Date (UTC) of a customer's first order

      - name: most_recent_order
        description: Date (UTC) of a customer's most recent order

      - name: number_of_orders
        description: Count of the number of orders a customer has placed

      - name: customer_lifetime_value
        description: Total value (AUD) of a customer's orders

      - name: customer_email
        description: Customer's email. PII.

      - name: signup_date
        description: Date (UTC) of a customer's signup to the online shop.

    meta: {}
  - name: orders
    description: This model represents the orders table, which contains basic information
      about orders placed by customers, as well as derived metrics based on the associated
      payment data. The model serves the purpose of providing a comprehensive view
      of order details and payment breakdowns, which can be useful for finance-related
      analyses and reporting. Key transformations include aggregating payment amounts
      by payment method (credit card, coupon, bank transfer, gift card) and calculating
      the total order amount.
    config:
      tags: ["finance"]

    columns:
      - name: order_id
        description: This is a unique identifier for an order

      - name: customer_id
        description: Foreign key to the customers table

      - name: order_date
        description: Date (UTC) that the order was placed

      - name: status
        description: '{{ doc("orders_status") }}'

      - name: amount
        description: Total amount (AUD) of the order

      - name: credit_card_amount
        description: Amount of the order (AUD) paid for by credit card

      - name: coupon_amount
        description: Amount of the order (AUD) paid for by coupon

      - name: bank_transfer_amount
        description: Amount of the order (AUD) paid for by bank transfer

      - name: gift_card_amount
        description: Amount of the order (AUD) paid for by gift card

    meta: {}
  - name: returned_orders
    description: This model contains all orders that have been returned or are currently
      in a 'return_pending' status. It provides a consolidated view of the order history,
      which can be used by the finance team to analyze trends and patterns in product
      returns. The model performs a simple filtering operation on the `orders` table
      to extract only the relevant rows with a `status` of 'return_pending' or 'returned'.
    config:
      tags: ["finance"]

    columns:
      - name: order_id
        description: This is a unique identifier for an order

      - name: customer_id
        description: Foreign key to the customers table

      - name: order_date
        description: Date (UTC) that the order was placed

      - name: status
        description: '{{ doc("orders_status") }}'

      - name: amount
        description: Total amount (AUD) of the order

      - name: credit_card_amount
        description: Amount of the order (AUD) paid for by credit card

      - name: coupon_amount
        description: Amount of the order (AUD) paid for by coupon

      - name: bank_transfer_amount
        description: Amount of the order (AUD) paid for by bank transfer

      - name: gift_card_amount
        description: Amount of the order (AUD) paid for by gift card
    meta: {}
