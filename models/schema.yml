version: 2

sources:
  - name: jaffle_shop
    description: A clone of a Postgres application database.
    database: postgres
    schema: public
    tables:
      - name: customers
        description: Raw customers data.
        columns:
          - name: id
            description: Primary key for customers.
            data_tests:
              - unique
              - not_null

      - name: orders
        description: Raw orders data.
        columns:
          - name: id
            description: Primary key for orders.
            data_tests:
              - unique
              - not_null

      - name: payments
        description: Raw payments data.
        columns:
          - name: id
            description: Primary key for payments.
            data_tests:
              - unique
              - not_null

models:
  - name: customers
    description: Customer overview data mart, offering key details for each unique customer. One row per customer.
    columns:
      - name: customer_id
        description: The unique key for each customer.
        data_tests:
          - unique
          - not_null

  - name: stg_customers
    description: Staged customer data from the raw customers table.
    columns:
      - name: customer_id
        description: The unique key for each customer.
        data_tests:
          - unique
          - not_null

  - name: stg_orders
    description: Staged order data from the raw orders table.
    columns:
      - name: order_id
        description: The unique key for each order.
        data_tests:
          - unique
          - not_null

  - name: stg_payments
    description: Staged payment data from the raw payments table.
    columns:
      - name: payment_id
        description: The unique key for each payment.
        data_tests:
          - unique
          - not_null

  - name: orders
    description: Order overview data mart, providing key details for each order including payment totals.
    columns:
      - name: order_id
        description: The unique key for each order.
        data_tests:
          - not_null
      - name: customer_id
        description: Foreign key to the customers table.
      - name: order_date
        description: Date the order was placed.
      - name: status
        description: Current status of the order.
      - name: credit_card_amount
        description: Amount paid via credit card for this order.
      - name: coupon_amount
        description: Amount paid via coupon for this order.
      - name: bank_transfer_amount
        description: Amount paid via bank transfer for this order.
      - name: gift_card_amount
        description: Amount paid via gift card for this order.
      - name: amount
        description: Total amount of the order across all payment methods.