version: 2

models:
  - name: customers
    description: This model represents the customer data for the organization, including
      basic customer information, order history, and payment details. It serves as
      a central source of truth for customer-related data, enabling data analysts
      and consumers to analyze customer behavior, lifetime value, and other key metrics.
      The model performs several transformations, such as calculating the first and
      most recent order dates, the number of orders per customer, and the total customer
      lifetime value based on the aggregated payment amounts.
    config:
      tags: ["PII"]

    columns:
      - name: customer_id
        description: This is a unique identifier for a customer

      - name: first_name
        description: Customer's first name. PII.

      - name: last_name
        description: Customer's last name. PII.

      - name: first_order
        description: Date (UTC) of a customer's first order

      - name: most_recent_order
        description: Date (UTC) of a customer's most recent order

      - name: number_of_orders
        description: Count of the number of orders a customer has placed

      - name: customer_lifetime_value
        description: Total value (AUD) of a customer's orders

      - name: customer_email
        description: Customer's email. PII.

      - name: signup_date
        description: Date (UTC) of a customer's signup to the online shop.

    meta: {}
  - name: orders
    description: This model represents the orders table, which contains basic information
      about orders, as well as some derived facts based on payments. It serves the
      finance domain by providing a consolidated view of orders and their associated
      payment information, such as the amounts paid by different payment methods (credit
      card, coupon, bank transfer, gift card) and the total amount of each order.
      This model performs the necessary transformations to calculate these payment-related
      metrics by joining the orders and payments data sources.
    config:
      tags: ["finance"]

    columns:
      - name: order_id
        description: This is a unique identifier for an order

      - name: customer_id
        description: Foreign key to the customers table

      - name: order_date
        description: Date (UTC) that the order was placed

      - name: status
        description: '{{ doc("orders_status") }}'

      - name: amount
        description: Total amount (AUD) of the order

      - name: credit_card_amount
        description: Amount of the order (AUD) paid for by credit card

      - name: coupon_amount
        description: Amount of the order (AUD) paid for by coupon

      - name: bank_transfer_amount
        description: Amount of the order (AUD) paid for by bank transfer

      - name: gift_card_amount
        description: Amount of the order (AUD) paid for by gift card

    meta: {}
  - name: returned_orders
    description: This model, `returned_orders`, contains a list of all orders that
      have been returned or are in the process of being returned. It serves a financial
      purpose by providing a record of orders that have been refunded or are awaiting
      refund. The model filters the `orders` table to only include rows where the
      `status` is either 'return_pending' or 'returned', allowing data consumers to
      easily identify and analyze returned orders.
    config:
      tags: ["finance"]

    columns:
      - name: order_id
        description: This is a unique identifier for an order

      - name: customer_id
        description: Foreign key to the customers table

      - name: order_date
        description: Date (UTC) that the order was placed

      - name: status
        description: '{{ doc("orders_status") }}'

      - name: amount
        description: Total amount (AUD) of the order

      - name: credit_card_amount
        description: Amount of the order (AUD) paid for by credit card

      - name: coupon_amount
        description: Amount of the order (AUD) paid for by coupon

      - name: bank_transfer_amount
        description: Amount of the order (AUD) paid for by bank transfer

      - name: gift_card_amount
        description: Amount of the order (AUD) paid for by gift card
    meta: {}
