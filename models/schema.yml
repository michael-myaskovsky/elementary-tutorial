version: 2

models:
  - name: customers
    description: This model represents a comprehensive view of customer information,
      including their order history, payment details, and signup data. It serves as
      a central repository for analyzing customer behavior and understanding customer
      lifetime value. The model performs key transformations, such as calculating
      the first and most recent order dates, the total number of orders per customer,
      and the total amount paid by each customer. This provides data consumers with
      a rich dataset to support customer-centric analyses and reporting.
    config:
      tags: ["PII"]

    columns:
      - name: customer_id
        description: This is a unique identifier for a customer

      - name: first_name
        description: Customer's first name. PII.

      - name: last_name
        description: Customer's last name. PII.

      - name: first_order
        description: Date (UTC) of a customer's first order

      - name: most_recent_order
        description: Date (UTC) of a customer's most recent order

      - name: number_of_orders
        description: Count of the number of orders a customer has placed

      - name: customer_lifetime_value
        description: Total value (AUD) of a customer's orders

      - name: customer_email
        description: Customer's email. PII.

      - name: signup_date
        description: Date (UTC) of a customer's signup to the online shop.

  - name: orders
    description: This model represents the orders table, which contains basic information
      about orders placed by customers, as well as derived facts based on the associated
      payment data. It serves the finance domain by providing a comprehensive view
      of order details and payment breakdowns, including credit card, coupon, bank
      transfer, and gift card amounts, as well as the total order amount. The model
      consolidates data from the `stg_orders` and `stg_payments` tables, and performs
      aggregations to calculate the various payment metrics for each order.
    config:
      tags: ["finance"]

    columns:
      - name: order_id
        description: This is a unique identifier for an order

      - name: customer_id
        description: Foreign key to the customers table

      - name: order_date
        description: Date (UTC) that the order was placed

      - name: status
        description: '{{ doc("orders_status") }}'

      - name: amount
        description: Total amount (AUD) of the order

      - name: credit_card_amount
        description: Amount of the order (AUD) paid for by credit card

      - name: coupon_amount
        description: Amount of the order (AUD) paid for by coupon

      - name: bank_transfer_amount
        description: Amount of the order (AUD) paid for by bank transfer

      - name: gift_card_amount
        description: Amount of the order (AUD) paid for by gift card

  - name: returned_orders
    description: This model represents a table of all orders that have been returned
      or are pending return. It serves the purpose of providing a centralized view
      of the order return process, which is important for financial reporting and
      analysis. The model filters the orders table to include only those with a status
      of 'return_pending' or 'returned', providing a clear and concise view of the
      relevant data.
    config:
      tags: ["finance"]

    columns:
      - name: order_id
        description: This is a unique identifier for an order

      - name: customer_id
        description: Foreign key to the customers table

      - name: order_date
        description: Date (UTC) that the order was placed

      - name: status
        description: '{{ doc("orders_status") }}'

      - name: amount
        description: Total amount (AUD) of the order

      - name: credit_card_amount
        description: Amount of the order (AUD) paid for by credit card

      - name: coupon_amount
        description: Amount of the order (AUD) paid for by coupon

      - name: bank_transfer_amount
        description: Amount of the order (AUD) paid for by bank transfer

      - name: gift_card_amount
        description: Amount of the order (AUD) paid for by gift card
