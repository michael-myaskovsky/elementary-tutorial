version: 2

models:
  - name: customers
    description: This model represents a comprehensive view of customer data, including
      basic customer information, their order history, payment history, and signup
      details. It serves as a central source of truth for customer-related analytics,
      enabling data consumers to understand customer behavior, lifetime value, and
      engagement. The model performs key transformations, such as calculating the
      first and most recent order dates, the total number of orders, and the customer's
      lifetime value based on their payment history.
    config:
      tags: ["PII"]

    columns:
      - name: customer_id
        description: This is a unique identifier for a customer

      - name: first_name
        description: Customer's first name. PII.

      - name: last_name
        description: Customer's last name. PII.

      - name: first_order
        description: Date (UTC) of a customer's first order

      - name: most_recent_order
        description: Date (UTC) of a customer's most recent order

      - name: number_of_orders
        description: Count of the number of orders a customer has placed

      - name: customer_lifetime_value
        description: Total value (AUD) of a customer's orders

      - name: customer_email
        description: Customer's email. PII.

      - name: signup_date
        description: Date (UTC) of a customer's signup to the online shop.

  - name: orders
    description: This model represents a table with basic information about orders,
      as well as derived metrics on payment methods and total order amounts. It serves
      the finance domain by providing a centralized source of order data, including
      the breakdown of payments by type (credit card, coupon, bank transfer, gift
      card) and the total order amount. The model consolidates data from the `stg_orders`
      and `stg_payments` tables to calculate these derived metrics, making it a useful
      resource for financial reporting and analysis.
    config:
      tags: ["finance"]

    columns:
      - name: order_id
        description: This is a unique identifier for an order

      - name: customer_id
        description: Foreign key to the customers table

      - name: order_date
        description: Date (UTC) that the order was placed

      - name: status
        description: '{{ doc("orders_status") }}'

      - name: amount
        description: Total amount (AUD) of the order

      - name: credit_card_amount
        description: Amount of the order (AUD) paid for by credit card

      - name: coupon_amount
        description: Amount of the order (AUD) paid for by coupon

      - name: bank_transfer_amount
        description: Amount of the order (AUD) paid for by bank transfer

      - name: gift_card_amount
        description: Amount of the order (AUD) paid for by gift card

  - name: returned_orders
    description: This model contains all orders that have been returned or are pending
      return. It serves the finance team by providing a comprehensive view of returned
      orders, which is important for understanding revenue, inventory management,
      and customer experience. The model simply selects all orders where the status
      is 'return_pending' or 'returned' from the source `orders` table.
    config:
      tags: ["finance"]

    columns:
      - name: order_id
        description: This is a unique identifier for an order

      - name: customer_id
        description: Foreign key to the customers table

      - name: order_date
        description: Date (UTC) that the order was placed

      - name: status
        description: '{{ doc("orders_status") }}'

      - name: amount
        description: Total amount (AUD) of the order

      - name: credit_card_amount
        description: Amount of the order (AUD) paid for by credit card

      - name: coupon_amount
        description: Amount of the order (AUD) paid for by coupon

      - name: bank_transfer_amount
        description: Amount of the order (AUD) paid for by bank transfer

      - name: gift_card_amount
        description: Amount of the order (AUD) paid for by gift card
