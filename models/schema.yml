version: 2

models:
  - name: customers
    description: This model represents a comprehensive view of customer information,
      including basic details, order history, and payment data. It serves as a central
      source of customer-related data for analysis and reporting purposes. The model
      aggregates information from multiple source tables, such as customer signups,
      orders, and payments, to provide a unified picture of each customer's lifetime
      value, order frequency, and other key metrics. This allows data consumers to
      better understand customer behavior and trends, which can inform business decisions
      and strategies.
    config:
      tags: ["PII"]

    columns:
      - name: customer_id
        description: This is a unique identifier for a customer

      - name: first_name
        description: Customer's first name. PII.

      - name: last_name
        description: Customer's last name. PII.

      - name: first_order
        description: Date (UTC) of a customer's first order

      - name: most_recent_order
        description: Date (UTC) of a customer's most recent order

      - name: number_of_orders
        description: Count of the number of orders a customer has placed

      - name: customer_lifetime_value
        description: Total value (AUD) of a customer's orders

      - name: customer_email
        description: Customer's email. PII.

      - name: signup_date
        description: Date (UTC) of a customer's signup to the online shop.

  - name: orders
    description: This model represents a comprehensive view of orders, including basic
      order information as well as detailed payment details. It serves as a key finance
      data asset, providing insights into the different payment methods used for orders,
      such as credit card, coupon, bank transfer, and gift card, as well as the total
      amount for each order. The model performs the necessary transformations to aggregate
      the payment information and join it with the original order details, offering
      a one-stop-shop for analyzing order and payment data.
    config:
      tags: ["finance"]

    columns:
      - name: order_id
        description: This is a unique identifier for an order

      - name: customer_id
        description: Foreign key to the customers table

      - name: order_date
        description: Date (UTC) that the order was placed

      - name: status
        description: '{{ doc("orders_status") }}'

      - name: amount
        description: Total amount (AUD) of the order

      - name: credit_card_amount
        description: Amount of the order (AUD) paid for by credit card

      - name: coupon_amount
        description: Amount of the order (AUD) paid for by coupon

      - name: bank_transfer_amount
        description: Amount of the order (AUD) paid for by bank transfer

      - name: gift_card_amount
        description: Amount of the order (AUD) paid for by gift card

  - name: returned_orders
    description: This model contains all orders that have been returned or are pending
      to be returned. It serves the finance team by providing a consolidated view
      of the order return status, which can be used for financial reporting and analysis.
      The model applies a simple filter on the `orders` table to extract only the
      rows with a `status` of 'return_pending' or 'returned'.
    config:
      tags: ["finance"]

    columns:
      - name: order_id
        description: This is a unique identifier for an order

      - name: customer_id
        description: Foreign key to the customers table

      - name: order_date
        description: Date (UTC) that the order was placed

      - name: status
        description: '{{ doc("orders_status") }}'

      - name: amount
        description: Total amount (AUD) of the order

      - name: credit_card_amount
        description: Amount of the order (AUD) paid for by credit card

      - name: coupon_amount
        description: Amount of the order (AUD) paid for by coupon

      - name: bank_transfer_amount
        description: Amount of the order (AUD) paid for by bank transfer

      - name: gift_card_amount
        description: Amount of the order (AUD) paid for by gift card
