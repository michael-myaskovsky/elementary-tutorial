version: 2

models:
  - name: customers
    description: This model represents a comprehensive view of customer information,
      including their basic details, order history, and payment data. It serves as
      a central source of truth for understanding customer lifetime value and behavior.
      The model performs key transformations such as calculating the first and most
      recent order dates, the total number of orders, and the total amount paid by
      each customer, providing valuable insights for data analysts and business stakeholders.
    config:
      tags: ["PII"]

    columns:
      - name: customer_id
        description: This is a unique identifier for a customer

      - name: first_name
        description: Customer's first name. PII.

      - name: last_name
        description: Customer's last name. PII.

      - name: first_order
        description: Date (UTC) of a customer's first order

      - name: most_recent_order
        description: Date (UTC) of a customer's most recent order

      - name: number_of_orders
        description: Count of the number of orders a customer has placed

      - name: customer_lifetime_value
        description: Total value (AUD) of a customer's orders

      - name: customer_email
        description: Customer's email. PII.

      - name: signup_date
        description: Date (UTC) of a customer's signup to the online shop.

  - name: orders
    description: This model represents the orders table, which contains basic information
      about customer orders, as well as derived metrics based on the associated payments.
      It serves the finance domain by providing a comprehensive view of order details
      and payment breakdowns, such as credit card, coupon, bank transfer, and gift
      card amounts. The key transformations include aggregating payment information
      by order and calculating the total order amount.
    config:
      tags: ["finance"]

    columns:
      - name: order_id
        description: This is a unique identifier for an order

      - name: customer_id
        description: Foreign key to the customers table

      - name: order_date
        description: Date (UTC) that the order was placed

      - name: status
        description: '{{ doc("orders_status") }}'

      - name: amount
        description: Total amount (AUD) of the order

      - name: credit_card_amount
        description: Amount of the order (AUD) paid for by credit card

      - name: coupon_amount
        description: Amount of the order (AUD) paid for by coupon

      - name: bank_transfer_amount
        description: Amount of the order (AUD) paid for by bank transfer

      - name: gift_card_amount
        description: Amount of the order (AUD) paid for by gift card

  - name: returned_orders
    description: This model contains all orders that have been returned or are pending
      return. It serves the finance team by providing a comprehensive view of returned
      orders, which can be used for analysis and reporting on refunds, returns, and
      other financial metrics related to order fulfillment. The model filters the
      orders table to include only those with a status of 'return_pending' or 'returned'.
    config:
      tags: ["finance"]

    columns:
      - name: order_id
        description: This is a unique identifier for an order

      - name: customer_id
        description: Foreign key to the customers table

      - name: order_date
        description: Date (UTC) that the order was placed

      - name: status
        description: '{{ doc("orders_status") }}'

      - name: amount
        description: Total amount (AUD) of the order

      - name: credit_card_amount
        description: Amount of the order (AUD) paid for by credit card

      - name: coupon_amount
        description: Amount of the order (AUD) paid for by coupon

      - name: bank_transfer_amount
        description: Amount of the order (AUD) paid for by bank transfer

      - name: gift_card_amount
        description: Amount of the order (AUD) paid for by gift card
